name: CI

on:
  push:
    branches: [ master, develop ]
    paths:
      - '**/*.js'
      - '**/*.jsx'
      - '**/*.ts'
      - '**/*.tsx'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
      - 'eslint.config.cjs'
      - 'vitest.config.ts'
      - 'tsup.config.ts'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ master ]
    paths:
      - '**/*.js'
      - '**/*.jsx'
      - '**/*.ts'
      - '**/*.tsx'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
      - 'eslint.config.cjs'
      - 'vitest.config.ts'
      - 'tsup.config.ts'
      - '.github/workflows/ci.yml'

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10
        
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'
        
    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile
      
    - name: Type check
      run: pnpm type-check
      
    - name: Lint
      run: pnpm lint
      
    - name: Build
      run: pnpm build
      
    - name: Check files exist
      run: |
        echo "Checking build output..."
        ls -la dist/
        test -f dist/index.js
        test -f dist/index.mjs
        test -f dist/index.d.ts
        echo "✅ All build files exist"
        
    - name: Check bundle size
      run: |
        echo "Bundle sizes:"
        du -h dist/*
