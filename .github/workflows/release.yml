name: Release

on:
  push:
    tags:
      - '**'

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish Package and Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@sinhaparth5'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release metadata
        run: pnpm release:check ${{ github.ref_name }}

      - name: Run quality checks
        run: |
          pnpm type-check
          pnpm lint
          pnpm test --run
          pnpm build

      - name: Prepare package metadata for GitHub Packages
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.name='@sinhaparth5/nucleus-state'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Publish package to GitHub Packages
        run: pnpm publish --no-git-checks --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
